# 사용자 브라우저 캡처의 사진 탭 query. $isNmap 변수는 우리 query 에서 사용 안 하므로 제거 필수
# (GraphQL validation 에러: 'Variable "$isNmap" is never used').
# 캡처 원본은 fragment 안에 @include(if: $isNmap) 가 있어 사용된 것.
#
# variables:
#   input.businessId: place_id
#   input.businessType: "hospital"
#   input.cursors: [{"id":"biz"},{"id":"clip"},{"id":"cp0"},{"id":"aiView"},{"id":"placeReview"},{"id":"cp"}]
#       biz         = 병원 공식 사진
#       clip        = 네이버 클립 동영상
#       cp0, cp     = 외부 콘텐츠 파트너 (블로그·뉴스)
#       aiView      = AI 가공/분류 이미지
#       placeReview = 방문자 후기 사진
#   input.dateRange: ""
#   input.excludeAuthorIds: []
#   input.excludeClipIds: []
#   input.excludeSection: []
#
# 실측 (자생한방 강남):
#   photos=46 (ibu=3 공식, visitor=4 후기, ugc=39 블로그)
#   cursors: biz startIndex=3 hasNext=False / placeReview startIndex=43 hasNext=True
#   externalLink 도메인: blog.naver.com 39건 (= ugc 채널 = 블로그 시그널 시드 URL 자동 큐레이션)

query getPhotoViewerItems($input: PhotoViewerInput) {
  photoViewer(input: $input) {
    cursors {
      id
      startIndex
      hasNext
      lastCursor
    }
    photos {
      viewId
      originalUrl
      originalDate
      width
      height
      title
      text
      desc
      link
      date
      photoType      # "ibu" | "visitor" | "ugc"
      mediaType      # null | "video"
      option {
        channelName
        dateString
        playCount
        likeCount
      }
      to
      relation
      logId
      author {
        id
        nickname
        from        # "NAVER" | null
        imageUrl
        objectId
        url
        borderImageUrl
        officialYn
      }
      votedKeywords {
        code
        iconUrl
        iconCode
        name
      }
      visitCount
      originType
      isFollowing
      businessName  # ibu 사진만 박힘 (= "자생한방병원" 등)
      rating
      externalLink {
        title       # "블로그"
        url         # ★ blog.naver.com 시드 URL
      }
      sourceTitle
      moment {
        channelId
        contentId
        momentId
        gdid
        category
        docNo
      }
      video {
        videoId
        videoUrl
        trailerUrl
      }
      music {
        artists
        title
      }
      clip {
        serviceType
        createdAt
        contentType
      }
    }
  }
}
