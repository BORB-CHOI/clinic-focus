# 사용자 캡처 그대로. 같은 query 를 itemId 두 형태(="0" / 누락)로 두 번 호출하는 게 캡처에 보임.
#
# variables (호출 1):
#   id: place_id
#   itemId: "0"
#   businessType: "hospital"
# variables (호출 2 - itemId 누락, 기본 "place"):
#   id: place_id
#   businessType: "hospital"
#
# 실측:
#   review.avgRating·totalCount·authorCount·imageReviewCount 정상
#   visitorReviewsTotal·ratingReviewsTotal 정상
#   analysis.themes=[]·menus=[]·votedKeyword.details=[]·totalCount=null 모두 빈 값 (병원 카테고리 통계 미제공)

query getVisitorReviewStats($id: String, $itemId: String, $businessType: String = "place") {
  visitorReviewStats(
    input: {businessId: $id, itemId: $itemId, businessType: $businessType}
  ) {
    id
    name
    review {
      avgRating
      totalCount
      scores { count score }
      starDistribution { count score }
      imageReviewCount
      authorCount
      maxSingleReviewScoreCount
      maxScoreWithMaxCount
    }
    analysis {
      themes { code label count }
      menus { code label count }
      votedKeyword {
        totalCount
        reviewCount
        userCount
        details {
          category
          code
          iconUrl
          iconCode
          displayName
          count
          previousRank
        }
      }
    }
    visitorReviewsTotal
    ratingReviewsTotal
  }
}
