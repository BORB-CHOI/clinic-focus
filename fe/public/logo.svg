<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="clinic-focus">
  <!-- 마크: 둥근 사각 배경 + 청진기/포커스 모티프 -->
  <rect x="2" y="6" width="28" height="28" rx="8" fill="hsl(217 91% 41%)"/>
  <!-- 청진기 이어피스 → 튜브 → 포커스 원 -->
  <path d="M11 13.5v3.2a5 5 0 0 0 10 0v-3.2" stroke="hsl(210 40% 99%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M16 21.7v2.1a4 4 0 0 0 4 4 4 4 0 0 0 4-4v-1.3" stroke="hsl(210 40% 99%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="24" cy="20.5" r="2.4" fill="none" stroke="hsl(210 40% 99%)" stroke-width="2"/>
  <!-- 포커스 도트 (실제 주력 = 한 점에 집중) -->
  <circle cx="11" cy="12.5" r="1.6" fill="hsl(151 81% 55%)"/>
  <circle cx="21" cy="12.5" r="1.6" fill="hsl(151 81% 55%)"/>
  <!-- 워드마크 -->
  <text x="38" y="26" font-family="'Pretendard Variable', Pretendard, system-ui, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="hsl(222 47% 11%)">clinic</tspan><tspan fill="hsl(217 91% 41%)">·focus</tspan>
  </text>
</svg>
